<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Comment syntax -->

    <meta charset="UTF-8">
    <title>Homepage</title>
    <style>
        p{
            font-family: Arial, Helvetica, sans-serif;
            color: grey;
        }
        h1{
            font-family: Arial, Helvetica, sans-serif;
        }
        h3{
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Div is a way of categorizing elements -->
<div>
    <h1>This is a heading</h1>
    <p style="text-align: center">Basic paragraph</p>

    <h3>List</h3>
    <ul class="list">
        <li>Item 1</li>
        <li class="list">Item 2</li>
        <li class="list"><a href="README.md">Hyperlink</a></li>
    </ul>
    <img src="https://pt.wallpapers.com/cool-roblox" alt="Alt text">
    <p>Imagine there's a cool image here</p>
</div>

<form action="index.html" method="GET">
    <input type="text" name="name" placeholder="Enter text here">
    <button type="submit">This text comes after the button is pressed</button>
</form>

<h3>Some CSS stuff</h3>
<p id="document-unique">Cool text</p>
<p style="color: slategrey; border: 4px lightgreen solid">Cool text (style override)</p>

</body>
</html>
