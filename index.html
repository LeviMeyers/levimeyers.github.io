<div class="main settings deltarune">
    <form>
        <div>
            <p>Include chapters:</p>
            <div class="vertList" id="chapterList">
                <label class="checkContainer">1
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
                <label class="checkContainer">2
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
                <label class="checkContainer">3
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
                <label class="checkContainer">4
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
            </div>
        </div>
        <div>
            <p>Include unlisted tracks</p>
            <label class="switch">
                <input type="checkbox" id="ulTracksToggle">
                <span class="slider"></span>
            </label>
        </div>
    </form>
    <form>
        <div>
            <p>Answer mode:</p>
            <div class="vertList" id="entryMode">
                <label class="checkContainer">Multiple choice
                    <input type="radio" name="answerMode" value="multChoice" checked="checked">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Text entry
                    <input type="radio" name="answerMode" value="textEntry">
                    <span class="checkmark radiomark"></span>
                </label>
            </div>
        </div>
        <div>
            <p>Question mode:</p>
            <div class="vertList" id="quizMode">
                <label class="checkContainer">Track name
                    <input type="radio" name="quizMode" value="trackName" checked="checked">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Location played
                    <input type="radio" name="quizMode" value="locationPlayed">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Motif
                    <input type="radio" name="quizMode" value="motif">
                    <span class="checkmark radiomark"></span>
                </label>
            </div>
        </div>
        <div id="diffWrapper">
            <p>Difficulty:</p>
            <div class="vertList" id="difficulty">
                <label class="checkContainer">Easy
                    <input type="radio" name="difficulty" value="easy">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Medium
                    <input type="radio" name="difficulty" value="medium" checked="checked">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Hard
                    <input type="radio" name="difficulty" value="hard">
                    <span class="checkmark radiomark"></span>
                </label>
            </div>
        </div>
    </form>
    <form>
        <div>
            <p>Rounds:</p>
            <div class="numController">
                <button type="button" class="numController" value="decrease"
                onclick="numController(this, false, 5, 5, 100)"></button>
                <span class="numController" id="rounds">10</span>
                <button type="button" class="numController" value="increase"
                onclick="numController(this, true, 5, 5, 100)"></button>
            </div>
        </div>
    </form>
    <button class="next" onclick="collectSettings()" type="submit">START</button>
</div>

<div class="main game deltarune">
    <div id="infoDiv">
        <p id="playingStatus">Get ready!</p>
        <h1>???</h1>
        <div id="countdown"><span>3</span><span>2</span><span>1</span></div>
        <p id="prompt">What is the name of this track?</p>
    </div>
    <div id="answers">
        <button>Answer 1</button>
        <button>Answer 2</button>
        <button>Answer 3</button>
<!--        when switching to text entry, set display: block manually and use element.focus() -->
        <label id="gameTextEntry" style="display: none">
            <textarea autocomplete="off" spellcheck="false" placeholder="Type answer here..."></textarea>
            <button onclick="collectTextInput()"></button>
        </label>
    </div>
    <button class="next" hidden>NEXT</button>
</div>
<small>Concept artwork by Temmie Chang</small>
