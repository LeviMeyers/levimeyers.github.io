<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>

<aside>
    <a href="deltarune.html" title="DELTARUNE" id=selectedGame>
        <img src="graphics/icon_deltarune.png" alt="DELTARUNE">
    </a>
    <a href="undertale.html" title="UNDERTALE">
        <img src="graphics/icon_undertale.png" alt="UNDERTALE">
    </a>
    <a href="hollowknight.html" title="Hollow Knight">
        <img src="graphics/icon_hollowknight.png" alt="Hollow Knight">
    </a>
</aside>

<div class="main" id="deltarune">
    <form>
        <div>
            <p>Include chapters:</p>
            <div class="vertList" id="chapterList">
                <label class="checkContainer">1
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
                <label class="checkContainer">2
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
                <label class="checkContainer">3
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
                <label class="checkContainer">4
                    <input type="checkbox" checked="checked" onclick="maintainChecklist('chapterList', this)">
                    <span class="checkmark"></span>
                </label>
            </div>
        </div>
        <div>
            <p>Include unlisted tracks</p>
            <label class="switch">
                <input type="checkbox" id="ulTracksToggle">
                <span class="slider"></span>
            </label>
        </div>
    </form>
    <form>
        <div>
            <p>Answer mode:</p>
            <div class="vertList" id="entryMode">
                <label class="checkContainer">Multiple choice
                    <input type="radio" name="answerMode" value="multChoice" checked="checked">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Text entry
                    <input type="radio" name="answerMode" value="textEntry">
                    <span class="checkmark radiomark"></span>
                </label>
            </div>
        </div>
        <div>
            <p>Question mode:</p>
            <div class="vertList" id="quizMode">
                <label class="checkContainer">Track name
                    <input type="radio" name="quizMode" value="trackName" checked="checked">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Location played
                    <input type="radio" name="quizMode" value="locationPlayed">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Motif
                    <input type="radio" name="quizMode" value="motif">
                    <span class="checkmark radiomark"></span>
                </label>
            </div>
        </div>
        <div id="diffWrapper">
            <p>Difficulty:</p>
            <div class="vertList" id="difficulty">
                <label class="checkContainer">Easy
                    <input type="radio" name="difficulty" value="easy">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Medium
                    <input type="radio" name="difficulty" value="medium" checked="checked">
                    <span class="checkmark radiomark"></span>
                </label>
                <label class="checkContainer">Hard
                    <input type="radio" name="difficulty" value="hard">
                    <span class="checkmark radiomark"></span>
                </label>
            </div>
        </div>
    </form>
    <button id="start" onclick="collectSettings()">START</button>
    <small>Concept artwork by Temmie Chang</small>
</div>

</body>
</html>
